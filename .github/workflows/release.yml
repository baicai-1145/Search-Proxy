name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0) — only used to name artifacts when run manually'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: search-proxy-linux-x64
            archive: tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: search-proxy-linux-arm64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: search-proxy-windows-x64
            archive: zip
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: search-proxy-mac-arm64
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: search-proxy-mac-x64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI (embedded into binary via rust-embed)
        working-directory: webui
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/search-proxy staging/
          cp README.md staging/ 2>/dev/null || true
          tar -C staging -czf ${{ matrix.artifact }}.tar.gz .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/search-proxy.exe staging/
          cp README.md staging/ 2>/dev/null || true
          (cd staging && 7z a ../${{ matrix.artifact }}.zip .)

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          mkdir -p assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} assets/ \;
          gh release create "${GITHUB_REF_NAME}" assets/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
